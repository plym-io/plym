name: In-process tests
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inprocess-tests:
    name: in-process API tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: plym_test
          POSTGRES_USER: plym
          POSTGRES_PASSWORD: plym
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plym"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PLYM_TEST_MODE: inprocess
      PLYM_TEST_DB_HOST: localhost
      PLYM_TEST_DB_PORT: "5432"
      PLYM_TEST_DB_NAME: plym_test
      PLYM_TEST_DB_USER: plym
      PLYM_TEST_DB_PASSWORD: plym

    steps:
      - uses: actions/checkout@v4

      - name: Materialize config.yaml
        run: cp config.yaml.example config.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run fast suite (unit + in-process)
        run: uv run pytest -q
