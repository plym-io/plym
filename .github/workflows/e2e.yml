name: E2E (reusable)

# Reusable end-to-end job: stands up the real stack (Postgres + API + Caddy) via
# docker compose and runs the suite over the network in "live" mode. Called by both
# pr.yml (on PRs) and main.yml (on merge to main) so there is one source of truth.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  e2e:
    name: end-to-end against compose stack
    runs-on: ubuntu-latest

    # The shipped compose file pulls plymio/plym from Docker Hub; the build override
    # makes every docker compose step here build and test THIS checkout instead.
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.build.yml

    steps:
      - uses: actions/checkout@v4

      - name: Materialize CI config for compose
        run: |
          cp .env.example .env
          sed -i 's#^PLYM_JWT_SECRET=.*#PLYM_JWT_SECRET=ci-only-jwt-secret-0123456789#' .env
          cp config.yaml.example config.yaml
          mkdir -p storage admin

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for the API to become healthy
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:9173/health > /dev/null; then
              echo "healthy after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::API did not become healthy in time"
          docker compose ps
          docker compose logs --no-color
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run end-to-end suite
        env:
          PLYM_TEST_BASE_URL: http://localhost:9173
        run: uv run pytest -q

      - name: API logs on failure
        if: failure()
        run: docker compose logs --no-color api

      - name: Tear down stack
        if: always()
        run: docker compose down -v
