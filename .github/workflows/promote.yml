name: Promote to Latest

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag (commit sha) to promote to latest
        required: true
        type: string

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          username: plymio
          password: ${{ secrets.PLYM_DOCKERHUB_TOKEN }}

      - run: docker buildx imagetools create -t plymio/plym:latest plymio/plym:${{ inputs.tag }}
