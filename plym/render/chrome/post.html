<!DOCTYPE html>
<html lang="{{ site.language }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ post.title }} — {{ site.name }}</title>
  {% if post.excerpt %}<meta name="description" content="{{ post.excerpt }}">{% endif %}
  {% if site.favicon %}<link rel="icon" href="{{ site.favicon }}">{% endif %}

  <meta property="og:title" content="{{ post.title }}">
  {% if post.excerpt %}<meta property="og:description" content="{{ post.excerpt }}">{% endif %}
  {% if post.cover %}<meta property="og:image" content="{{ post.cover }}">{% endif %}
  <meta property="og:type" content="article">
  {% if post.published_at %}<meta property="article:published_time" content="{{ post.published_at }}">{% endif %}

  <link rel="canonical" href="{{ post.canonical }}">
  {% if post.cover %}<link rel="preload" as="image" href="{{ post.cover }}" fetchpriority="high">{% endif %}
</head>
<body class="plym-post">
{{ body | safe }}
</body>
</html>
