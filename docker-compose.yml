services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PLYM_DB_NAME:-plym}
      POSTGRES_USER: ${PLYM_DB_USER:-plym}
      POSTGRES_PASSWORD: ${PLYM_DB_PASSWORD:-plym}
    volumes:
      - plym_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLYM_DB_USER:-plym}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${PLYM_IMAGE:-plymio/plym:latest}
    env_file: .env
    labels:
      io.plym.instance: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./templates:/app/plym/templates:ro
      - ./storage:/app/storage
      - ./admin:/app/admin:ro

  caddy:
    image: caddy:2-alpine
    environment:
      PLYM_BLOG_PREFIX: ${PLYM_BLOG_PREFIX:-/blog}
    depends_on:
      - api
    ports:
      - "${PLYM_PORT:-9173}:80"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./storage:/srv/storage:ro

  mcp:
    image: ${PLYM_IMAGE:-plymio/plym:latest}
    profiles: ["mcp"]
    env_file: .env
    environment:
      PLYM_MCP_BASE_URL: http://api:8000
      PLYM_MCP_TRANSPORT: http
      PLYM_MCP_HOST: 0.0.0.0
    command: ["python", "-m", "plym.mcp"]
    depends_on:
      - api
    ports:
      - "127.0.0.1:${PLYM_MCP_PUBLISH_PORT:-9369}:8000"

volumes:
  plym_db:
