services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PLYM_DB_NAME:-plym}
      POSTGRES_USER: ${PLYM_DB_USER:-plym}
      POSTGRES_PASSWORD: ${PLYM_DB_PASSWORD:-plym}
    volumes:
      - plym_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLYM_DB_USER:-plym}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        PLYM_ADMIN_VERSION: ${PLYM_ADMIN_VERSION:-}
        PLYM_ADMIN_BUST: ${PLYM_ADMIN_BUST:-}
    env_file: .env
    labels:
      io.plym.instance: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./plym:/app/plym:ro
      - ./storage:/app/storage

  caddy:
    image: caddy:2-alpine
    environment:
      PLYM_BLOG_PREFIX: ${PLYM_BLOG_PREFIX:-/blog}
    depends_on:
      - api
    ports:
      - "${PLYM_PORT:-9173}:80"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./storage:/srv/storage:ro

volumes:
  plym_db:
