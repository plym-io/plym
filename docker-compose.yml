services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PLYM_DB_NAME:-plym}
      POSTGRES_USER: ${PLYM_DB_USER:-plym}
      POSTGRES_PASSWORD: ${PLYM_DB_PASSWORD:-plym}
    volumes:
      - plym_db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLYM_DB_USER:-plym}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        PLYM_ADMIN_VERSION: ${PLYM_ADMIN_VERSION:-}
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./plym:/app/plym:ro
      - plym_storage:/app/storage

volumes:
  plym_db:
  plym_storage:
